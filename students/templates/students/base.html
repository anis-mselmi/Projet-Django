<!DOCTYPE html>
<html>
<head>
  <title>Student Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container d-flex justify-content-between">
        <a class="navbar-brand" href="/">Student Manager</a>
        <div>
            {% if user.is_authenticated %}
                <span class="text-white me-3">Bonjour, {{ user.username }}</span>
                <a href="{% url 'student_create' %}" class="btn btn-light btn-sm me-2">+ Add Student</a>
                <form action="{% url 'logout' %}" method="post" class="d-inline">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-outline-light btn-sm">Se déconnecter</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm">Se connecter</a>
            {% endif %}
        </div>
    </div>
    </nav>
    <div class="container">
    {% block content %}{% endblock %}
    </div>
</body>
</html>
